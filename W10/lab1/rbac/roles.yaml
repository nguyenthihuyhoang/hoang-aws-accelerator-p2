apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-demo
  namespace: demo
rules:
  - apiGroups:
      - ""
      - apps
    resources:
      - deployments
      - pods
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-pod-operator
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - events
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer-cluster
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
