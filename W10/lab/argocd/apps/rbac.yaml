apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenthihuyhoang/hoang-aws-accelerator-p2.git
    targetRevision: HEAD
    path: lab/rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
