apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab1-gatekeeper
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nguyenthihuyhoang/hoang-aws-accelerator-p2.git'
    targetRevision: HEAD
    path: W10/lab1/gatekeeper
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
