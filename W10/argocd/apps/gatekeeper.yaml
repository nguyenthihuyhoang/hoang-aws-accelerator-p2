apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab1-gatekeeper
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/<your-org>/<your-repo>.git'
    targetRevision: HEAD
    path: 'lab1/gatekeeper'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
