apiVersion: v1
kind: ConfigMap
metadata:
  name: web-html-config
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Hoang AWS Accelerator Lab</title>
        <meta charset="utf-8">
        <style>
            body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .card { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center; border: 1px solid #38bdf8; max-width: 500px; }
            h1 { color: #38bdf8; margin-bottom: 15px; font-size: 1.8rem; }
            p { color: #94a3b8; line-height: 1.6; }
            .badge { display: inline-block; background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 15px; border: 1px solid rgba(56, 189, 248, 0.2); }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🚀 Hoang AWS Accelerator - Part 2</h1>
            <p>Xin chào Mentor! Dự án tự động hóa triển khai Kubernetes (Minikube) trên máy ảo EC2 bằng Terraform 1-Click đã hoạt động hoàn hảo.</p>
            <div class="badge">Phục vụ từ K8s ConfigMap Mount</div>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        # Gắn ConfigMap vào đường dẫn chứa file index.html của Nginx
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      # Định nghĩa Volume lấy dữ liệu từ ConfigMap
      volumes:
      - name: html-volume
        configMap:
          name: web-html-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
spec:
  type: NodePort
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
