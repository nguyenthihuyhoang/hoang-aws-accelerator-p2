apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-success-rate
  namespace: demo
spec:
  metrics:
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: result >= 0.95
      failureLimit: 1
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: sum(rate(w9_api_requests_total{namespace="demo",status!~"5.."}[2m])) / sum(rate(w9_api_requests_total{namespace="demo"}[2m]))
